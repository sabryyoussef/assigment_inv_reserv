name: Odoo Module CI

on:
  push:
    branches:
      - main
      - second_test
  pull_request:

jobs:
  test-addon:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Python syntax
        run: python3 -m compileall addons/stock_reservation_engine

      - name: Pull Odoo 18 image
        run: docker pull odoo:18.0

      - name: Run module tests
        run: |
          # The official Odoo Docker image entrypoint reads /etc/odoo/odoo.conf
          # (which has db_host = db) and passes that hostname to wait-for-psql.py
          # before Odoo's own --db_host flag takes effect. Override it by mounting
          # a minimal config that points to the postgres service container on localhost.
          mkdir -p "$RUNNER_TEMP/odoo-cfg"
          printf '[options]\ndb_host = 127.0.0.1\ndb_port = 5432\ndb_user = odoo\ndb_password = odoo\n' \
            > "$RUNNER_TEMP/odoo-cfg/odoo.conf"

          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/addons:/mnt/extra-addons" \
            -v "$RUNNER_TEMP/odoo-cfg/odoo.conf:/etc/odoo/odoo.conf:ro" \
            odoo:18.0 \
            odoo \
            --database ci_stock_reservation \
            --without-demo=all \
            --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
            -i stock_reservation_engine \
            --test-enable \
            --stop-after-init
