services:
  locust:
    image: locustio/locust:latest
    container_name: locust_odoo_test
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    environment:
      - ODOO_API_TOKEN=${ODOO_API_TOKEN}
      - ODOO_PRODUCT_ID=${ODOO_PRODUCT_ID:-1}
      - ODOO_LOCATION_ID=${ODOO_LOCATION_ID:-1}
      - ODOO_QTY=${ODOO_QTY:-1}
    command: >
      -f /mnt/locust/locustfile.py
      --host=http://host.docker.internal:8018
